name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  quality:
    name: Lint, type-check & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src/semanticlint/

      - name: Unit tests
        run: uv run pytest tests/unit/ -q --cov=semanticlint --cov-report=term-missing

      - name: BDD tests
        run: uv run pytest tests/step_defs/ -q --tb=short

      - name: Coverage report
        run: uv run coverage report --fail-under=80
